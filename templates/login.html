<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart AquaFarm | Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#0077b6,#00b4d8,#90e0ef);

overflow:hidden;

position:relative;

}

/* Decorative circles */

body::before{

content:"";

position:absolute;

width:380px;

height:380px;

background:rgba(255,255,255,.12);

border-radius:50%;

top:-150px;

left:-120px;

}

body::after{

content:"";

position:absolute;

width:320px;

height:320px;

background:rgba(255,255,255,.12);

border-radius:50%;

bottom:-120px;

right:-120px;

}

/* Login Card */

.login-card{

width:430px;

background:rgba(255,255,255,.18);

backdrop-filter:blur(15px);

padding:45px;

border-radius:20px;

box-shadow:0 15px 35px rgba(0,0,0,.25);

color:white;

position:relative;

z-index:10;

}

/* Logo */

.logo{

font-size:70px;

text-align:center;

margin-bottom:10px;

}

/* Heading */

.login-card h2{

text-align:center;

font-weight:bold;

margin-bottom:8px;

}

.subtitle{

text-align:center;

font-size:15px;

opacity:.9;

margin-bottom:30px;

}

/* Labels */

label{

font-weight:600;

margin-bottom:8px;

display:block;

}

/* Inputs */

.input-group{

margin-bottom:20px;

}

.input-group-text{

background:#0d6efd;

color:white;

border:none;

}

.form-control{

height:50px;

border:none;

}

.form-control:focus{

box-shadow:none;

border:2px solid #0d6efd;

}

/* Button */

.btn-login{

width:100%;

height:52px;

font-size:18px;

font-weight:bold;

border-radius:10px;

margin-top:10px;

transition:.3s;

}

.btn-login:hover{

transform:translateY(-2px);

}

/* Register */

.register{

text-align:center;

margin-top:25px;

}

.register a{

color:#fff;

font-weight:bold;

text-decoration:none;

}

.register a:hover{

text-decoration:underline;

}

/* Footer */

.footer{

margin-top:25px;

text-align:center;

font-size:13px;

opacity:.8;

}

@media(max-width:500px){

.login-card{

width:92%;

padding:30px;

}

}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">

🐟

</div>

<h2>

Smart AquaFarm

</h2>

<p class="subtitle">

Smart Aquaculture Farm Management System

</p>

<form action="/loginuser" method="POST">

<label>Email Address</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-envelope-fill"></i>

</span>

<input
type="email"
name="email"
class="form-control"
placeholder="Enter your email"
required>

</div>

<label>Password</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-lock-fill"></i>

</span>

<input
type="password"
name="password"
class="form-control"
placeholder="Enter your password"
required>

</div>

<button
type="submit"
class="btn btn-primary btn-login">

<i class="bi bi-box-arrow-in-right"></i>

Login

</button>

</form>

<div class="register">

Don't have an account?

<a href="/register">

Create Account

</a>

</div>

<div class="footer">

© 2026 Smart AquaFarm

</div>

</div>

</body>

</html>
