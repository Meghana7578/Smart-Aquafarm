<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Pond</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="static/css/style.css">

</head>

<body>

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="text-center text-primary">🐟 Add New Pond</h2>

<hr>

<form action=#>

<div class="mb-3">
<label>Pond Name</label>
<input type="text" name="pond_name" class="form-control" required>
</div>

<div class="mb-3">
<label>Fish Species</label>
<input type="text" name="species" class="form-control" required>
</div>

<div class="mb-3">
<label>Area (Square Meters)</label>
<input type="number" name="area" class="form-control" required>
</div>

<div class="mb-3">
<label>Fish Count</label>
<input type="number" name="fish_count" class="form-control" required>
</div>

<div class="text-center">

<button class="btn btn-primary">
Save Pond
</button>

<a href="dashboard.html" class="btn btn-success">
Dashboard
</a>

</div>

</form>

</div>

</div>

</body>
</html>
