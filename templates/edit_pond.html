<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Edit Pond</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow-lg">

        <div class="card-header bg-primary text-white">

            <h2 class="text-center">

                ✏ Edit Pond

            </h2>

        </div>

        <div class="card-body">

            <form action="/updatepond" method="POST">

                <!-- Hidden Pond ID -->

                <input
                    type="hidden"
                    name="pond_id"
                    value="{{ pond[0] }}">

                <!-- Pond Name -->

                <div class="mb-3">

                    <label class="form-label">

                        Pond Name

                    </label>

                    <input
                        type="text"
                        name="pond_name"
                        class="form-control"
                        value="{{ pond[1] }}"
                        required>

                </div>

                <!-- Species -->

                <div class="mb-3">

                    <label class="form-label">

                        Fish Species

                    </label>

                    <input
                        type="text"
                        name="species"
                        class="form-control"
                        value="{{ pond[2] }}"
                        required>

                </div>

                <!-- Area -->

                <div class="mb-3">

                    <label class="form-label">

                        Area (Square Meters)

                    </label>

                    <input
                        type="number"
                        name="area"
                        class="form-control"
                        value="{{ pond[3] }}"
                        required>

                </div>

                <!-- Fish Count -->

                <div class="mb-3">

                    <label class="form-label">

                        Fish Count

                    </label>

                    <input
                        type="number"
                        name="fish_count"
                        class="form-control"
                        value="{{ pond[4] }}"
                        required>

                </div>

                <div class="d-grid gap-2">

                    <button
                        type="submit"
                        class="btn btn-success">

                        <i class="bi bi-check-circle"></i>

                        Update Pond

                    </button>

                    <a
                        href="/ponds"
                        class="btn btn-secondary">

                        <i class="bi bi-arrow-left-circle"></i>

                        Back to View Ponds

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</body>

</html>
