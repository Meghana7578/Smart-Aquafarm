<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Edit Growth Record</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-warning">

<h2 class="text-center">

✏ Edit Fish Growth

</h2>

</div>

<div class="card-body">

<form action="/updategrowth" method="POST">

<input
type="hidden"
name="growth_id"
value="{{ record[0] }}">

<div class="mb-3">

<label>

Growth Date

</label>

<input
type="date"
name="growth_date"
class="form-control"
value="{{ record[2] }}"
required>

</div>

<div class="mb-3">

<label>

Average Weight

</label>

<input
type="number"
step="0.01"
name="avg_weight"
class="form-control"
value="{{ record[3] }}"
required>

</div>

<div class="mb-3">

<label>

Average Length

</label>

<input
type="number"
step="0.01"
name="avg_length"
class="form-control"
value="{{ record[4] }}"
required>

</div>

<div class="mb-3">

<label>

Fish Count

</label>

<input
type="number"
name="fish_count"
class="form-control"
value="{{ record[5] }}"
required>

</div>

<div class="text-center">

<button
class="btn btn-success">

Update Growth

</button>

<a
href="/growthrecords"
class="btn btn-secondary">

Back

</a>

</div>

</form>

</div>

</div>

</div>

</body>

</html>
